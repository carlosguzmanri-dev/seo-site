<!doctype html>
<html lang="en">
  <head>
    <!-- ============================================ -->
    <!-- META TAGS FUNDAMENTALES -->
    <!-- ============================================ -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Título principal del sitio (50-60 caracteres óptimo) -->
    <title>SEO Optimized Site - Complete SEO Best Practices Guide</title>

    <!-- Descripción meta (150-160 caracteres óptimo) -->
    <meta
      name="description"
      content="Learn and implement SEO best practices with our comprehensive guide. Includes meta tags, structured data, semantic HTML, and more for better search rankings."
    />

    <!-- Palabras clave (opcional, Google no las usa pero otros motores sí) -->
    <meta
      name="keywords"
      content="SEO, search engine optimization, meta tags, structured data, web development, technical SEO, on-page SEO"
    />

    <!-- Autor del sitio -->
    <meta name="author" content="SEO Optimized Team" />

    <!-- Robots - control de indexación -->
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <!-- ============================================ -->
    <!-- CANONICAL URL - Evita contenido duplicado -->
    <!-- ============================================ -->
    <link
      rel="canonical"
      href="https://carlosguzmanri-dev.github.io/seo-site/"
    />

    <!-- ============================================ -->
    <!-- OPEN GRAPH - Facebook, LinkedIn, WhatsApp -->
    <!-- ============================================ -->
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="SEO Optimized Site - Complete SEO Best Practices Guide"
    />
    <meta
      property="og:description"
      content="Learn and implement SEO best practices with our comprehensive guide. Includes meta tags, structured data, semantic HTML, and more."
    />
    <meta
      property="og:url"
      content="https://carlosguzmanri-dev.github.io/seo-site/"
    />
    <meta property="og:site_name" content="SEO Optimized Site" />
    <meta
      property="og:image"
      content="https://carlosguzmanri-dev.github.io/seo-site/images/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="SEO Optimized Site - Best Practices Guide"
    />

    <!-- ============================================ -->
    <!-- TWITTER CARDS - Twitter/X -->
    <!-- ============================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="SEO Optimized Site - Complete SEO Best Practices Guide"
    />
    <meta
      name="twitter:description"
      content="Learn and implement SEO best practices with our comprehensive guide. Includes meta tags, structured data, semantic HTML, and more."
    />
    <meta
      name="twitter:image"
      content="https://carlosguzmanri-dev.github.io/seo-site/images/twitter-image.jpg"
    />
    <meta name="twitter:site" content="@seosite" />
    <meta name="twitter:creator" content="@seosite" />

    <!-- ============================================ -->
    <!-- FAVICON - Iconos del sitio -->
    <!-- ============================================ -->
    <link rel="icon" type="image/x-icon" href="/public/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ============================================ -->
    <!-- MANIFEST - PWA (Progressive Web App) -->
    <!-- ============================================ -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ============================================ -->
    <!-- THEME COLOR - Color del navegador móvil -->
    <!-- ============================================ -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />

    <!-- ============================================ -->
    <!-- PRECONNECT - Mejora performance -->
    <!-- ============================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ============================================ -->
    <!-- DNS-PREFETCH - Resolución DNS anticipada -->
    <!-- ============================================ -->
    <link rel="dns-prefetch" href="//www.google-analytics.com" />

    <!-- ============================================ -->
    <!-- STRUCTURED DATA - JSON-LD Schema.org -->
    <!-- ============================================ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://carlosguzmanri-dev.github.io/seo-site/#website",
            "url": "https://carlosguzmanri-dev.github.io/seo-site/",
            "name": "SEO Optimized Site",
            "description": "Complete SEO Best Practices Guide",
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://carlosguzmanri-dev.github.io/seo-site/search?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            },
            "inLanguage": "en-US"
          },
          {
            "@type": "Organization",
            "@id": "https://carlosguzmanri-dev.github.io/seo-site/#organization",
            "name": "SEO Optimized Site",
            "url": "https://carlosguzmanri-dev.github.io/seo-site/",
            "logo": {
              "@type": "ImageObject",
              "@id": "https://carlosguzmanri-dev.github.io/seo-site/#logo",
              "url": "https://carlosguzmanri-dev.github.io/seo-site/images/logo.png",
              "width": 512,
              "height": 512,
              "caption": "SEO Optimized Site"
            },
            "image": {
              "@id": "https://carlosguzmanri-dev.github.io/seo-site/#logo"
            },
            "sameAs": [
              "https://www.facebook.com/seosite",
              "https://www.linkedin.com/company/seosite",
              "https://www.instagram.com/seosite"
            ],
            "contactPoint": {
              "@type": "ContactPoint",
              "telephone": "+1-123-456-7890",
              "contactType": "customer service",
              "email": "contact@seosite.com",
              "areaServed": "US",
              "availableLanguage": ["English"]
            }
          },
          {
            "@type": "WebPage",
            "@id": "https://carlosguzmanri-dev.github.io/seo-site/#webpage",
            "url": "https://carlosguzmanri-dev.github.io/seo-site/",
            "name": "SEO Optimized Site - Complete SEO Best Practices Guide",
            "isPartOf": {
              "@id": "https://carlosguzmanri-dev.github.io/seo-site/#website"
            },
            "about": {
              "@id": "https://carlosguzmanri-dev.github.io/seo-site/#organization"
            },
            "description": "Learn and implement SEO best practices with our comprehensive guide.",
            "inLanguage": "en-US"
          }
        ]
      }
    </script>

    <!-- ============================================ -->
    <!-- GOOGLE ANALYTICS (Opcional) -->
    <!-- ============================================ -->
    <!-- Global site tag (gtag.js) - Google Analytics -->

    <!-- ============================================ -->
    <!-- GOOGLE SEARCH CONSOLE (Verificación) -->
    <!-- ============================================ -->
    <!-- <meta name="google-site-verification" content="TU_CODIGO_DE_VERIFICACION" /> -->

    <!-- ============================================ -->
    <!-- BING WEBMASTER TOOLS (Verificación) -->
    <!-- ============================================ -->
    <!-- <meta name="msvalidate.01" content="TU_CODIGO_DE_VERIFICACION" /> -->

    <!-- ============================================ -->
    <!-- SEGURIDAD -->
    <!-- ============================================ -->
    <!-- Content Security Policy (opcional pero recomendado) -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline';"
    />

    <!-- Referrer Policy -->
    <meta name="referrer" content="no-referrer-when-downgrade" />
  </head>
  <body>
    <!-- ============================================ -->
    <!-- NOSCRIPT - Mensaje si JavaScript está deshabilitado -->
    <!-- ============================================ -->
    <noscript>
      <div
        style="
          padding: 20px;
          background: #f44336;
          color: white;
          text-align: center;
        "
      >
        You need to enable JavaScript to run this app.
      </div>
    </noscript>

    <!-- ============================================ -->
    <!-- ROOT - Aquí se monta React -->
    <!-- ============================================ -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- ============================================ -->
    <!-- SKIP TO MAIN CONTENT - Accesibilidad -->
    <!-- ============================================ -->
    <a
      href="#main-content"
      class="skip-to-main"
      style="position: absolute; left: -9999px"
    >
      Skip to main content
    </a>
  </body>
</html>
